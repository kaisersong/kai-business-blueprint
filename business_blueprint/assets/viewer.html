<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Business Blueprint Viewer</title>
    <style>
      :root {
        --bg: #eef3f8;
        --panel: #ffffff;
        --ink: #162231;
        --muted: #5a6b7f;
        --line: #c8d6e4;
        --accent: #0b5bd3;
        --accent-soft: #d9e7ff;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: "Segoe UI", sans-serif; background: linear-gradient(180deg, #f7fbff 0%, var(--bg) 100%); color: var(--ink); }
      header { display: flex; justify-content: space-between; gap: 16px; align-items: center; padding: 16px 20px; background: #0f2742; color: #fff; }
      main { display: grid; grid-template-columns: 280px 1fr; min-height: calc(100vh - 72px); }
      aside, section { padding: 20px; }
      aside { background: rgba(255,255,255,.9); border-right: 1px solid var(--line); }
      section { display: grid; gap: 16px; }
      .card { background: var(--panel); border: 1px solid var(--line); border-radius: 16px; padding: 16px; box-shadow: 0 10px 30px rgba(14, 35, 60, 0.06); }
      .badge { display: inline-block; padding: 4px 8px; background: var(--accent-soft); color: var(--accent); border-radius: 999px; font-size: 12px; font-weight: 600; }
      .muted { color: var(--muted); }
      input, textarea { width: 100%; border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; font: inherit; background: #fff; }
      textarea { min-height: 240px; resize: vertical; }
      button { border: none; border-radius: 10px; background: var(--accent); color: #fff; padding: 10px 14px; font: inherit; cursor: pointer; }
      .actions { display: flex; gap: 10px; flex-wrap: wrap; }
      @media (max-width: 860px) {
        main { grid-template-columns: 1fr; }
        aside { border-right: 0; border-bottom: 1px solid var(--line); }
      }
    </style>
  </head>
    <body>
    <script>
      const blueprint = JSON.parse(__BLUEPRINT_JSON__);
      const patchLog = JSON.parse(__PATCH_LOG_JSON__);
      let savedPatchSnapshot = "";

      function downloadText(filename, content, type) {
        const blob = new Blob([content], { type });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        link.click();
      }

      function realPatchEntries() {
        return patchLog.filter((entry) => entry.op !== "seed_patch_log");
      }

      function refreshSavedSnapshot() {
        savedPatchSnapshot = JSON.stringify(realPatchEntries());
      }

      function firstCapability() {
        return (blueprint.library?.capabilities || [])[0] || null;
      }

      function firstSystem() {
        return (blueprint.library?.systems || [])[0] || null;
      }

      function ensureLocks() {
        blueprint.editor = blueprint.editor || {};
        blueprint.editor.fieldLocks = blueprint.editor.fieldLocks || {};
      }

      function updateSummary() {
        document.getElementById("revision-id").textContent = blueprint.meta.revisionId || "unknown";
        document.getElementById("dirty-state").textContent =
          JSON.stringify(realPatchEntries()) === savedPatchSnapshot ? "Saved" : "Unsaved edits";
        document.getElementById("json-view").value = JSON.stringify(blueprint, null, 2);
      }

      function renameTitle() {
        const nextValue = document.getElementById("title-input").value.trim();
        blueprint.meta.title = nextValue || blueprint.meta.title || "Generated Blueprint";
        ensureLocks();
        blueprint.editor.fieldLocks["meta.title"] = "human";
        patchLog.push({ op: "update_meta", fields: { title: blueprint.meta.title } });
        updateSummary();
      }

      function updateCapabilityDescription() {
        const capability = firstCapability();
        if (!capability) return;
        capability.description = document.getElementById("capability-description").value.trim();
        ensureLocks();
        blueprint.editor.fieldLocks[`library.capabilities.${capability.id}.description`] = "human";
        patchLog.push({ op: "update_node", id: capability.id, fields: { description: capability.description } });
        updateSummary();
      }

      function updateSystemDescription() {
        const system = firstSystem();
        if (!system) return;
        system.description = document.getElementById("system-description").value.trim();
        ensureLocks();
        blueprint.editor.fieldLocks[`library.systems.${system.id}.description`] = "human";
        patchLog.push({ op: "update_node", id: system.id, fields: { description: system.description } });
        updateSummary();
      }

      function exportRevision() {
        downloadText("solution.blueprint.json", JSON.stringify(blueprint, null, 2), "application/json");
        downloadText(
          "solution.patch.jsonl",
          patchLog.map((entry) => JSON.stringify(entry)).join("\n") + "\n",
          "application/x-ndjson",
        );
        refreshSavedSnapshot();
        updateSummary();
      }

      window.addEventListener("DOMContentLoaded", () => {
        document.getElementById("title-input").value = blueprint.meta.title || "";
        document.getElementById("capability-description").value = firstCapability()?.description || "";
        document.getElementById("system-description").value = firstSystem()?.description || "";
        document.getElementById("rename-button").addEventListener("click", renameTitle);
        document.getElementById("capability-button").addEventListener("click", updateCapabilityDescription);
        document.getElementById("system-button").addEventListener("click", updateSystemDescription);
        document.getElementById("save-button").addEventListener("click", exportRevision);
        refreshSavedSnapshot();
        updateSummary();
      });
    </script>
    <header>
      <div>
        <div class="badge">IR First Viewer</div>
        <h1 style="margin:8px 0 0;font-size:22px;">Business Blueprint Workbench</h1>
      </div>
      <div class="muted">Revision: <strong id="revision-id">unknown</strong> · <span id="dirty-state">Saved</span></div>
    </header>
    <main>
      <aside>
        <div class="card">
          <h2 style="margin-top:0;font-size:18px;">Light Edit</h2>
          <p class="muted">Viewer edits are not the source of truth. Export a new canonical JSON revision.</p>
          <label for="title-input">Title</label>
          <input id="title-input" />
          <div class="actions" style="margin-top:12px;">
            <button id="rename-button" type="button">Apply Title</button>
            <button id="save-button" type="button">Export Revision</button>
          </div>
          <div style="height: 16px;"></div>
          <label for="capability-description">First Capability Description</label>
          <textarea id="capability-description"></textarea>
          <button id="capability-button" type="button" style="margin-top:12px;">Apply Capability Description</button>
          <div style="height: 16px;"></div>
          <label for="system-description">First System Description</label>
          <textarea id="system-description"></textarea>
          <button id="system-button" type="button" style="margin-top:12px;">Apply System Description</button>
        </div>
      </aside>
      <section>
        <div class="card">
          <h2 style="margin-top:0;font-size:18px;">Canonical JSON</h2>
          <textarea id="json-view" readonly></textarea>
        </div>
      </section>
    </main>
  </body>
</html>
